services:
  mongo:
    image: mongo:${MONGO_IMAGE_TAG:-8.0}
    container_name: lingua-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-language_flashcards}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: lingua-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: ${API_PORT:-5000}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/language_flashcards}
      JWT_SECRET: ${JWT_SECRET:-change_me_for_production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
      NODE_ENV: ${NODE_ENV:-production}

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: lingua-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  mongo_data:
